services:
  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: mcq-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
    command: >
      sh -c "
      echo 'user nginx;
      worker_processes auto;
      error_log /var/log/nginx/error.log notice;
      pid /var/run/nginx.pid;

      events {
          worker_connections 1024;
      }

      http {
          include /etc/nginx/mime.types;
          default_type application/octet-stream;
          sendfile on;
          keepalive_timeout 65;
          client_max_body_size 100M;

          # HTTP server - redirect to HTTPS
          server {
              listen 80;
              server_name edumark.vihangamunasinghe.com;
              return 301 https://$$server_name$$request_uri;
          }

          # HTTPS server
          server {
              listen 443 ssl http2;
              server_name edumark.vihangamunasinghe.com;

              # SSL Configuration
              ssl_certificate /etc/nginx/ssl/cert.pem;
              ssl_certificate_key /etc/nginx/ssl/key.pem;
              ssl_protocols TLSv1.2 TLSv1.3;
              ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
              ssl_prefer_server_ciphers off;
              ssl_session_cache shared:SSL:10m;
              ssl_session_timeout 10m;

              # Security headers
              add_header Strict-Transport-Security \"max-age=31536000; includeSubDomains\" always;
              add_header X-Frame-Options DENY always;
              add_header X-Content-Type-Options nosniff always;
              add_header X-XSS-Protection \"1; mode=block\" always;

              location / {
                  proxy_pass http://frontend:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $$http_upgrade;
                  proxy_set_header Connection \"upgrade\";
                  proxy_set_header Host $$host;
                  proxy_set_header X-Real-IP $$remote_addr;
                  proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto https;
                  proxy_cache_bypass $$http_upgrade;
              }

              location /api {
                  proxy_pass http://backend:8000;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $$http_upgrade;
                  proxy_set_header Connection \"upgrade\";
                  proxy_set_header Host $$host;
                  proxy_set_header X-Real-IP $$remote_addr;
                  proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto https;
                  proxy_cache_bypass $$http_upgrade;
              }

              location /ws {
                  proxy_pass http://backend:8000;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $$http_upgrade;
                  proxy_set_header Connection \"upgrade\";
                  proxy_set_header Host $$host;
                  proxy_set_header X-Real-IP $$remote_addr;
                  proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto https;
              }
          }
      }' > /etc/nginx/nginx.conf &&
      nginx -g 'daemon off;'
      "
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - mcq-network

  # Frontend - Next.js (Production)
  frontend:
    image: ${DOCKER_REGISTRY:-your-dockerhub-username}/edumark:frontend
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_BACKEND_URL=${BACKEND_URL:-https://edumark.vihangamunasinghe.com}
    restart: unless-stopped
    networks:
      - mcq-network

  # Backend - FastAPI (Production)
  backend:
    image: ${DOCKER_REGISTRY:-your-dockerhub-username}/edumark:backend
    expose:
      - "8000"
    environment:
      - PYTHONPATH=/app
      # Database Configuration
      - DATABASE_URL=postgresql://${POSTGRES_USER:-mcq_user}:${POSTGRES_PASSWORD:-mcq_password}@postgres:5432/${POSTGRES_DB:-mcq_database}
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=${POSTGRES_DB:-mcq_database}
      - DATABASE_USER=${POSTGRES_USER:-mcq_user}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-mcq_password}
      - DATABASE_POOL_SIZE=${DATABASE_POOL_SIZE:-10}
      - DATABASE_MAX_OVERFLOW=${DATABASE_MAX_OVERFLOW:-20}
      - DATABASE_POOL_RECYCLE=${DATABASE_POOL_RECYCLE:-300}
      - DATABASE_ECHO=${DATABASE_ECHO:-false}
      # Application Configuration
      - APP_NAME=${APP_NAME:-MCQ OCR System}
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - DEBUG=${DEBUG:-false}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      # Shared Storage
      - NFS_SHARED_PATH=/shared
      # RabbitMQ Configuration
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD:-secret}@rabbitmq:5672
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-admin}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-secret}
      # Authentication & Security
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-this-in-production}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - SUPER_USER_EMAIL=${SUPER_USER_EMAIL:-superadmin@uom.lk}
      - SUPER_USER_PASSWORD=$$2a$$12$$f6zMbD/vf/CHwbTDRfEHCeZUnIATx/PUBTyqeVoFMAAMZ7JLQap1m
      - COOKIE_SECURE=${COOKIE_SECURE:-true}
      - COOKIE_SAMESITE=${COOKIE_SAMESITE:-none}
      - COOKIE_HTTPONLY=${COOKIE_HTTPONLY:-true}
    volumes:
      - nfs_storage:/shared:rw
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      shared-storage:
        condition: service_started
    restart: unless-stopped
    user: "1000:1000"
    networks:
      - mcq-network

  # Database - PostgreSQL (Production)
  postgres:
    image: postgres:15-alpine
    container_name: mcq-postgres-prod
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mcq_database}
      POSTGRES_USER: ${POSTGRES_USER:-mcq_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mcq_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./fastapi_backend/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-mcq_user} -d ${POSTGRES_DB:-mcq_database}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - mcq-network

  # Message Queue - RabbitMQ (Production)
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: mcq-rabbitmq-prod
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-secret}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - mcq-network

  # Shared Storage (Production)
  shared-storage:
    image: alpine:latest
    container_name: shared-storage-prod
    volumes:
      - nfs_storage:/shared
    command: >
      sh -c "
        echo 'Setting up shared storage...' &&
        mkdir -p /shared/uploads /shared/templates /shared/results /shared/reports /shared/temp /shared/backups /shared/intermediate/ &&
        mkdir -p /shared/uploads/answer_sheets /shared/uploads/templates /shared/uploads/marking_schemes &&
        mkdir -p /shared/templates/configs /shared/templates/processed &&
        mkdir -p /shared/results/markings /shared/intermediate/templates/
        chmod -R 777 /shared &&
        chown -R 1000:1000 /shared &&
        echo 'Shared storage ready' &&
        tail -f /dev/null
      "
    restart: unless-stopped
    networks:
      - mcq-network

  # MCQ Marking System (Production)
  mcq-marking-system:
    image: ${DOCKER_REGISTRY:-your-dockerhub-username}/edumark:marking
    volumes:
      - nfs_storage:/shared:rw
    depends_on:
      rabbitmq:
        condition: service_healthy
      shared-storage:
        condition: service_started
    environment:
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD:-secret}@rabbitmq:5672
      - NFS_SHARED_PATH=/shared
      - INDEX_TASK_QUEUE=index_tasks
      - INDEX_RESULTS_QUEUE=index_results
      - TEMPLATE_CONFIG_QUEUE=template_config_queue
      - MARKING_JOB_QUEUE=marking_job_queue
      - MARKING_CONFIG_QUEUE=marking_scheme_config_queue
      - MARKING_JOB_RESULTS_QUEUE=marking_job_results
      - TEMPLATE_CONFIG_RESULTS_QUEUE=template_config_results
      - MARKING_CONFIG_RESULTS_QUEUE=marking_scheme_config_results
    restart: unless-stopped
    user: "1000:1000"
    networks:
      - mcq-network

  # Index Recognizer (Production)
  index-recognizer:
    image: ${DOCKER_REGISTRY:-your-dockerhub-username}/edumark:recognizer
    volumes:
      - nfs_storage:/shared
    depends_on:
      rabbitmq:
        condition: service_healthy
      shared-storage:
        condition: service_started
    environment:
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD:-secret}@rabbitmq:5672
      - RABBITMQ_INCOMING_QUEUE=index_tasks
      - RABBITMQ_OUTGOING_QUEUE=index_results
      - NFS_SHARED_PATH=/shared
    restart: unless-stopped
    networks:
      - mcq-network

volumes:
  postgres-data:
  rabbitmq-data:
  nfs_storage:

networks:
  mcq-network:
    driver: bridge
